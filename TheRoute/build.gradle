buildscript {
    repositories {
        google()
        mavenCentral()
        // Add the Chaquopy repository here
        maven { url "https://chaquo.com/maven" }
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:7.0.0'
        classpath 'com.chaquo.python:gradle:9.1.0'  // Add the Chaquopy plugin
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // Add the Chaquopy repository here as well
        maven { url "https://chaquo.com/maven" }
    }
}
